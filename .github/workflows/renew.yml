name: Auto Renew Katabump

on:  
  schedule:
    - cron: '22 1 * * *'
  workflow_dispatch:

jobs:
   auto_renew_katabump:
    runs-on: ubuntu-22.04
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Start X Virtual Frame Buffer (Xvfb)
        run: Xvfb :99 -ac &
            
      - name: Run Script in Stealth Mode (via Xvfb)
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          python renew_katabump.py
